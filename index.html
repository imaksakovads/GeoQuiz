<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoQuiz Ultra | Мир на Ладони</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- Контролы темы и звука -->
        <div class="top-controls">
            <button class="icon-btn" onclick="toggleSound()" title="Вкл/Выкл звук"><i data-lucide="volume-2" id="sound-icon"></i></button>
            <button class="icon-btn" onclick="toggleTheme()" title="Сменить тему"><i data-lucide="moon" id="theme-icon"></i></button>
        </div>

        <!-- 1. СТАРТОВЫЙ ЭКРАН -->
        <div id="start-screen" class="screen active">
            <div class="header-content">
                <i data-lucide="globe-2" class="header-icon"></i>
                <h1>GeoQuiz Ultra</h1>
                <p class="subtitle">Умный тренажер географии</p>
            </div>
            
            <div class="mode-selector">
                <button class="mode-btn selected" onclick="selectMode('flags', this)"><i data-lucide="flag"></i> Флаги</button>
                <button class="mode-btn" onclick="selectMode('capitals', this)"><i data-lucide="map-pin"></i> Столицы</button>
                <button class="mode-btn" onclick="selectMode('sprint', this)"><i data-lucide="timer"></i> Спринт</button>
                <!-- ⚡ НОВЫЙ РЕЖИМ -->
                <button class="mode-btn" onclick="selectMode('survival', this)"><i data-lucide="heart"></i> Выживание</button>
            </div>

            <div class="filter-section">
                <div class="filter-group">
                    <label>Режим игры</label>
                    <div class="select-wrapper">
                        <select id="filter-continent" class="custom-select" onchange="updateBgColor()">
                            <option value="all">🌍 Весь мир</option>
                            <option value="mistakes">⚠️ Работа над ошибками</option>
                            <option value="guessed_only">🏆 Учить столицы по флагам</option>
                            <option value="europe">🇪🇺 Европа</option>
                            <option value="asia">🌏 Азия</option>
                            <option value="americas">🌎 Америка</option>
                            <option value="africa">🌍 Африка</option>
                            <option value="oceania">🌏 Океания</option>
                        </select>
                        <i data-lucide="chevron-down" class="select-arrow"></i>
                    </div>
                </div>

                <div class="filter-group">
                    <label>Сложность</label>
                    <div class="select-wrapper">
                        <select id="filter-difficulty" class="custom-select">
                            <option value="all">⭐ Любая</option>
                            <option value="easy">🟢 Легкий</option>
                            <option value="medium">🟡 Средний</option>
                            <option value="hard">🔴 Сложный</option>
                        </select>
                        <i data-lucide="chevron-down" class="select-arrow"></i>
                    </div>
                </div>

                <label class="custom-checkbox-wrapper">
                    <input type="checkbox" id="hide-common">
                    <div class="checkmark-box"><i data-lucide="check" class="checkmark-icon"></i></div>
                    <span>Скрыть популярные страны</span>
                </label>

                <label class="custom-checkbox-wrapper">
                    <input type="checkbox" id="hide-guessed">
                    <div class="checkmark-box"><i data-lucide="check" class="checkmark-icon"></i></div>
                    <span>Скрыть угаданные ранее</span>
                </label>
                
                <div style="display:flex; justify-content: space-between; margin-top: 8px;">
                    <div class="reset-link" onclick="resetHistory('guessedCountries')">
                        <i data-lucide="trash-2" style="width:14px;"></i> Угаданные: <span id="guessed-count" style="color:var(--success)">0</span>
                    </div>
                    <div class="reset-link" onclick="resetHistory('wrongCountries')">
                        <i data-lucide="trash-2" style="width:14px;"></i> Ошибки: <span id="mistakes-count">0</span>
                    </div>
                </div>
            </div>

            <div id="error-message" class="error-msg"></div>
            
            <button class="btn-main" onclick="startGame()"><i data-lucide="play"></i> Начать игру</button>
            <!-- ⚡ КНОПКА АТЛАСА -->
            <button class="btn-secondary" onclick="openAtlas()"><i data-lucide="book-open"></i> Мой Атлас</button>
        </div>

        <!-- 2. ИГРОВОЙ ЭКРАН -->
        <div id="game-screen" class="screen">
            <div class="game-header">
                <span class="progress-text" id="progress-txt">Вопрос 1 из 30</span>
                <div style="display:flex; gap: 12px; align-items:center;">
                    <!-- ⚡ БЛОК ЖИЗНЕЙ (Скрыт по умолчанию) -->
                    <span id="lives-container" style="display:none; font-size: 1.1rem; letter-spacing: 2px;"></span>
                    <span class="streak-badge" id="streak-badge-container"><i data-lucide="flame"></i> <span id="streak-num">0</span></span>
                </div>
            </div>
            
            <div id="mascot">🦉</div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="game-progress"></div>
                <span id="progress-globe">🌍</span>
            </div>
            <div class="timer-container"><div class="timer-line" id="timer-line"></div></div>
            
            <div class="question-box" id="question-box">
                <div class="flag-wrapper" id="flag-container">
                    <div class="skeleton-loader" id="flag-skeleton"></div>
                    <img id="question-flag" class="flag-img" src="" alt="Флаг">
                </div>
                <div id="question-text" class="question-text">Загрузка...</div>
            </div>
            
            <div class="options-grid" id="options-grid"></div>
            
            <div class="hint-box" id="hint-box"></div>
        </div>

        <!-- 3. ЭКРАН РЕЗУЛЬТАТОВ -->
        <div id="results-screen" class="screen">
            <div class="result-icon-wrapper"><i data-lucide="award"></i></div>
            <div class="score-text"><span id="result-score-animate">0</span> / <span id="result-total">30</span></div>
            <div class="title-text" id="result-title">Загрузка...</div>
            
            <div class="stats-summary">
                <div class="stat-item"><i data-lucide="flame"></i><div class="stat-val" id="stat-max-streak">0</div><div class="stat-lbl">Макс. Стрик</div></div>
                <div class="stat-item"><i data-lucide="clock"></i><div class="stat-val" id="stat-time">0с</div><div class="stat-lbl">Время</div></div>
            </div>
            <button class="btn-main" onclick="toStartScreen()"><i data-lucide="rotate-ccw"></i> На главный экран</button>
        </div>

        <!-- ⚡ 4. ЭКРАН АТЛАСА (ЭНЦИКЛОПЕДИЯ) -->
        <div id="atlas-screen" class="screen">
            <div class="header-content" style="margin-bottom: 16px;">
                <i data-lucide="book-open" class="header-icon"></i>
                <h2>Мой Атлас</h2>
                <p class="subtitle">Собери их всех: <span id="atlas-progress" style="color:var(--primary); font-weight:700;">0/194</span></p>
            </div>
            <div id="atlas-grid" class="atlas-grid"></div>
            <button class="btn-secondary" onclick="toStartScreen()" style="margin-top: 20px;"><i data-lucide="arrow-left"></i> Вернуться в меню</button>
        </div>

        <!-- ⚡ ВСПЛЫВАЮЩЕЕ ОКНО (МОДАЛКА) ДЛЯ ФАКТОВ -->
        <div id="atlas-modal" class="atlas-modal">
            <div class="atlas-modal-content" id="atlas-modal-content"></div>
        </div>

    </div>
    
    <div class="app-footer">GeoQuiz Ultra © 2026</div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
